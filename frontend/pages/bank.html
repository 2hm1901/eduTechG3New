<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StudyBot Bank</title>
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/bank.css">
</head>
<body>
  <div class="page-shell app-shell">
    <header class="topbar app-topbar reveal">
      <div class="topbar-main">
        <a href="bank.html" class="brand-mark">StudyBot</a>
        <nav class="topbar-nav">
          <a class="nav-link active" href="bank.html">Bank</a>
        </nav>
      </div>
      <div class="topbar-side">
        <div class="pill-list" id="status-pills"></div>
        <div class="status">User <strong id="user-label"></strong></div>
        <button class="btn-secondary" id="logout-btn">Logout</button>
      </div>
    </header>

    <section class="page-head reveal">
      <div>
        <span class="eyebrow">Source Library</span>
        <h1>Document Bank</h1>
        <p class="muted">Upload once. Click a document to study.</p>
      </div>
      <div class="page-head-actions">
        <button class="btn-primary" id="browse-upload">Upload file</button>
        <input type="file" id="upload-input" hidden accept=".pdf,.txt,.md">
      </div>
    </section>

    <main class="bank-content reveal">
      <section class="panel bank-main-full">
        <section class="dropzone bank-upload" id="dropzone">
          <div>
            <div class="dropzone-mark">PDF / TXT / MD</div>
            <strong>Drop files here</strong>
            <p class="small muted" id="upload-note">Nothing uploaded yet.</p>
          </div>
        </section>

        <div class="doc-table" id="docs-list"></div>
      </section>
    </main>
  </div>

  <div class="auth-overlay open" id="auth-overlay">
    <div class="auth-box">
      <h2>StudyBot Sign In</h2>
      <p class="muted">Sign in to continue.</p>
      <div class="stack">
        <input id="auth-user" placeholder="Username">
        <input id="auth-pass" type="password" placeholder="Password">
        <div id="auth-error" class="small" style="color: var(--danger); min-height: 18px;"></div>
        <div class="row">
          <button class="btn-primary" id="auth-login">Sign in</button>
          <button class="btn-secondary" id="auth-register">Register</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-stack" id="toast-stack"></div>
  <script src="../assets/js/amazon-cognito-identity.min.js"></script>
  <script src="../config.js"></script>
  <script type="module" src="../assets/js/bank.js"></script>
</body>
</html>
