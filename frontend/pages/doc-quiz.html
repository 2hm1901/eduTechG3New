<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StudyBot — Document Quiz</title>
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/folder.css">
  <link rel="stylesheet" href="../assets/css/doc-workspace.css">
</head>
<body class="doc-workspace-page">
  <div class="page-shell app-shell">
    <header class="topbar app-topbar reveal">
      <div class="topbar-main">
        <a href="/" class="brand-mark">StudyBot</a>
        <nav class="topbar-nav">
          <a class="nav-link" href="/">Bank</a>
          <a class="nav-link active" href="#">Quiz</a>
        </nav>
      </div>
      <div class="topbar-side">
        <div class="status">User <strong id="user-label"></strong></div>
        <button class="btn-secondary" id="logout-btn">Logout</button>
      </div>
    </header>

    <section class="page-head reveal">
      <div>
        <span class="eyebrow">Document Quiz</span>
        <h1 id="doc-title">Loading document...</h1>
        <p class="muted" id="doc-meta">Preparing your 10-question quiz...</p>
      </div>
      <div class="page-head-actions">
        <a class="btn btn-secondary" href="/" id="back-link">← Back to Bank</a>
      </div>
    </section>

    <main class="doc-workspace-layout reveal" style="grid-template-columns: 1fr 300px; gap: 1rem; max-width: 1100px; margin: 0 auto; padding-top: 2rem;">
      <section class="panel doc-main-panel">
        <div class="chat-shell" style="padding: 2rem; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border);">
          <div id="loading-state" class="doc-loading-state" style="display: grid;">
            <div class="loading-spinner"></div>
            <p class="muted">Generating your quiz... This might take a moment.</p>
          </div>
          
          <div id="quiz-container" style="display: none;">
            <div id="quiz-questions" class="stack"></div>
            <div class="action-stack" style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border);">
              <button class="btn-primary" id="submit-quiz-btn">Submit Quiz</button>
              <div id="quiz-result"></div>
            </div>
          </div>
        </div>
      </section>

      <aside class="panel side-panel" style="background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); padding: 1.5rem; align-self: start;">
        <h3 style="margin-top: 0; margin-bottom: 1rem; font-size: 1.1rem;">Quiz History</h3>
        <div id="quiz-history-list" class="stack" style="gap: 10px;">
          <div class="empty small">Loading history...</div>
        </div>
      </aside>
    </main>
  </div>

  <div class="auth-overlay" id="auth-overlay">
  <script>if(!localStorage.getItem("sb_user"))document.getElementById("auth-overlay").classList.add("open");</script>
    <div class="auth-box">
      <h2>StudyBot Sign In</h2>
      <p class="muted">Sign in to continue.</p>
      <div class="stack">
        <input id="auth-user" placeholder="Username">
        <input id="auth-pass" type="password" placeholder="Password">
        <div id="auth-error" class="small auth-error"></div>
        <div class="row">
          <button class="btn-primary" id="auth-login">Sign in</button>
          <button class="btn-secondary" id="auth-register">Register</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-stack" id="toast-stack"></div>
  <script src="../assets/js/amazon-cognito-identity.min.js"></script>
  <script src="../config.js"></script>
  <script type="module" src="../assets/js/doc-quiz.js"></script>
</body>
</html>
